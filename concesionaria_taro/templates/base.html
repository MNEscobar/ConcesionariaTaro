{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Concesionaria Taro{% endblock %}</title>
    <!-- Tipografía Montserrat desde Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Estilos globales -->
    <link rel="stylesheet" href="{% static 'css/globalStyles.css' %}">

    <!-- Estilos específicos --->
    {% block extra_styles %}
    {% endblock %}
</head>
<body>
    {% include 'header.html' %}

    <main>
        {% block content %}
        {% endblock %}
    </main>

    {% include 'footer.html' %}

    <script src="{% static 'simulador/js/scripts.js' %}"></script>
    {% block extra_scripts %}
    {% endblock %}
</body>
</html>
